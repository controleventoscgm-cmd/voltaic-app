<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voltaic Spa | v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; }
        .glass-card { background: #1e293b; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .price-box { background: #0f172a; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-green { background: #22c55e; color: #000; font-weight: 800; border-radius: 12px; }
        .btn-dark { background: #1e293b; color: #94a3b8; font-weight: 600; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .active-tab { border: 2px solid #22c55e; color: #22c55e !important; background: rgba(34, 197, 94, 0.1); }
        .badge-top { background: #22c55e; color: #000; font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 10px; position: absolute; top: -10px; right: 20px; }
    </style>
</head>
<body class="p-4 pb-20">
    <header class="flex justify-between items-center mb-6 pt-2">
        <div>
            <h1 class="text-2xl font-black italic text-white uppercase">VOLTAIC<span class="text-blue-400 not-italic font-light">spa</span></h1>
            <p class="text-[10px] text-green-400 font-bold uppercase tracking-widest">GPS CONECTADO ✅</p>
        </div>
        <div class="w-10 h-10 glass-card flex items-center justify-center text-xl">📍</div>
    </header>

    <div class="grid grid-cols-2 gap-3 mb-8">
        <button onclick="setMode('price')" id="btn-baratas" class="btn-dark py-4 flex items-center justify-center gap-2 active-tab">💰 BARATAS</button>
        <button onclick="setMode('dist')" id="btn-cercanas" class="btn-dark py-4 flex items-center justify-center gap-2">📍 CERCANAS</button>
    </div>

    <div id="lista" class="space-y-6">
        <p class="text-center text-gray-500 animate-pulse uppercase font-bold py-10">Sincronizando precios...</p>
    </div>

    <script>
        let mode = 'price';
        const E = 'cristiangodoymarchant@gmail.com'; 
        const K = 'Isigod5815';

        function setMode(m) {
            mode = m;
            document.getElementById('btn-baratas').classList.toggle('active-tab', m==='price');
            document.getElementById('btn-cercanas').classList.toggle('active-tab', m==='dist');
            ini();
        }

        async function ini() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const url = `https://api.cne.cl/v3/combustibles/vehicular/estaciones?token=${K}&email=${E}`;
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                    const json = await res.json();
                    const d = JSON.parse(json.contents);
                    render(d.data, pos.coords.latitude, pos.coords.longitude);
                } catch (e) { document.getElementById('lista').innerHTML = "Error de red."; }
            });
        }

        function render(data, uLa, uLo) {
            const rad = Math.PI/180;
            let list = data.map(e => {
                const dLa = (e.ubicacion.latitud - uLa) * rad;
                const dLo = (e.ubicacion.longitud - uLo) * rad;
                const a = Math.sin(dLa/2)**2 + Math.cos(uLa*rad) * Math.cos(e.ubicacion.latitud*rad) * Math.sin(dLo/2)**2;
                return {...e, dist: 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))};
            }).filter(e => e.dist <= 20);

            if(mode === 'price') list.sort((a,b) => a.precios['gasolina 93'] - b.precios['gasolina 93']);
            else list.sort((a,b) => a.dist - b.dist);

            let h = '';
            list.slice(0, 15).forEach((e, i) => {
                h += `
                <div class="glass-card p-6 relative">
                    ${i === 0 ? '<span class="badge-top text-black">TOP</span>' : ''}
                    <div class="flex justify-between items-start mb-4">
                        <div class="pr-8">
                            <h2 class="text-xl font-black text-white uppercase leading-none">${e.nombre_fantasia}</h2>
                            <p class="text-[10px] text-gray-400 mt-2 uppercase italic leading-tight">📍 ${e.direccion}, ${e.nombre_comuna}</p>
                        </div>
                        <span class="btn-dark px-3 py-1 text-[11px] font-bold">${e.dist.toFixed(1)} KM</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-5">
                        <div class="price-box p-3 text-center">
                            <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">93 OCT</p>
                            <p class="text-2xl font-black text-green-500">$${e.precios['gasolina 93']}</p>
                        </div>
                        <div class="price-box p-3 text-center">
                            <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">95 OCT</p>
                            <p class="text-2xl font-black text-blue-400">$${e.precios['gasolina 95']}</p>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="window.location.href='waze://?ll=${e.ubicacion.latitud},${e.ubicacion.longitud}&navigate=yes'" 
                            class="flex-1 bg-sky-400 text-black font-black py-4 rounded-2xl text-xs uppercase tracking-widest">WAZE</button>
                        <button class="w-14 btn-dark flex items-center justify-center text-lg">📍</button>
                    </div>
                </div>`;
            });
            document.getElementById('lista').innerHTML = h;
        }
        ini();
    </script>
</body>
</html>
