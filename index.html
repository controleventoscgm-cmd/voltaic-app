<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voltaic v1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .tab-active { background: #22c55e !important; color: #000 !important; font-weight: bold; }
    </style>
</head>
<body class="p-4">
    <header class="flex justify-between items-center mb-6 pt-4 uppercase italic font-black">
        <h1 class="text-2xl">VOLTAIC<span class="text-green-500 font-light not-italic">spa</span></h1>
        <div class="w-10 h-10 glass flex items-center justify-center text-lg">⚡</div>
    </header>

    <div class="glass p-1 flex gap-1 mb-4 text-[10px] font-bold uppercase">
        <button onclick="setR(15, this)" class="btn-r flex-1 py-3 rounded-xl tab-active">15 KM</button>
        <button onclick="setR(35, this)" class="btn-r flex-1 py-3 rounded-xl">35 KM</button>
        <button onclick="setR(50, this)" class="btn-r flex-1 py-3 rounded-xl">50 KM</button>
    </div>

    <div class="glass p-1 flex gap-1 mb-6 text-[10px] font-bold uppercase">
        <button onclick="setT(1, this)" id="t1" class="btn-t flex-1 py-3 rounded-xl tab-active">93 Oct</button>
        <button onclick="setT(3, this)" id="t3" class="btn-t flex-1 py-3 rounded-xl">Diesel</button>
    </div>

    <div id="lista" class="space-y-4">Cargando estaciones...</div>

    <script>
        let R = 15; let T = 1;
        const E = 'cristiangodoymarchant@gmail.com'; 
        const K = 'Isigod5815';

        function setR(km, b){ R=km; upd(b, '.btn-r'); ini(); }
        function setT(t, b){ T=t; upd(b, '.btn-t'); ini(); }
        function upd(b, cls){ document.querySelectorAll(cls).forEach(x=>x.classList.remove('tab-active')); b.classList.add('tab-active'); }

        async function ini() {
            const list = document.getElementById('lista');
            list.innerHTML = '<p class="text-center text-green-500 animate-pulse font-bold">BUSCANDO PRECIOS...</p>';
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const url = `https://api.cne.cl/v3/combustibles/vehicular/estaciones?token=${K}&email=${E}`;
                    // Este puente (corsproxy) es el que mejor funciona hoy en Chile
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                    const json = await res.json();
                    const d = JSON.parse(json.contents);
                    
                    const rad = Math.PI/180;
                    const f = d.data.map(e => {
                        const dLa = (e.ubicacion.latitud - pos.coords.latitude) * rad;
                        const dLo = (e.ubicacion.longitud - pos.coords.longitude) * rad;
                        const a = Math.sin(dLa/2)**2 + Math.cos(pos.coords.latitude*rad) * Math.cos(e.ubicacion.latitud*rad) * Math.sin(dLo/2)**2;
                        return {...e, dist: 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))};
                    }).filter(e => e.dist <= R).sort((a,b) => {
                        const pa = T==1 ? a.precios['gasolina 93'] : a.precios['petroleo diesel'];
                        const pb = T==1 ? b.precios['gasolina 93'] : b.precios['petroleo diesel'];
                        return pa - pb;
                    });

                    let h = '';
                    f.forEach(e => {
                        const p = T==1 ? e.precios['gasolina 93'] : e.precios['petroleo diesel'];
                        if(!p) return;
                        h += `<div class="glass p-5 mb-4">
                            <div class="flex justify-between font-bold text-white uppercase italic"><span>${e.nombre_fantasia}</span><span class="text-green-400 text-xs">${e.dist.toFixed(1)}KM</span></div>
                            <div class="text-3xl font-black text-green-500 my-2">$${p}</div>
                            <button onclick="window.location.href='waze://?ll=${e.ubicacion.latitud},${e.ubicacion.longitud}&navigate=yes'" class="w-full bg-[#33ccff] text-black font-black py-4 rounded-xl text-xs uppercase tracking-widest">WAZE</button>
                        </div>`;
                    });
                    list.innerHTML = h || '<p class="text-center">No hay bombas cerca.</p>';
                } catch (e) { list.innerHTML = '<p class="text-center text-red-500">Error de red. Refresca.</p>'; }
            });
        }
        ini();
    </script>
</body>
</html>
