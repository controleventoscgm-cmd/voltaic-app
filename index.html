<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Voltaic Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0f1a; color: #fff; font-family: ui-sans-serif, system-ui, sans-serif; }
        .card { background: #1a2235; border-radius: 24px; border: 1px solid #2d3748; overflow: hidden; }
        .btn-green { background: #22c55e; color: #000; font-weight: 800; }
        .btn-dark { background: #111827; color: #94a3b8; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-4 pb-20">
    <header class="flex justify-between items-center mb-6 pt-2 font-black italic">
        <h1 class="text-2xl text-white tracking-tighter">VOLTAIC<span class="text-blue-500 not-italic font-light">spa</span></h1>
        <div class="px-3 py-1 bg-gray-900 border border-green-500/30 rounded-full text-[10px] text-green-500 font-bold uppercase tracking-widest pulse">Sistema Online</div>
    </header>

    <div class="grid grid-cols-2 gap-3 mb-8 bg-black/40 p-1.5 rounded-3xl border border-gray-800">
        <button onclick="cambiar(1)" id="btn1" class="py-4 rounded-2xl text-xs font-bold uppercase btn-green">93 OCT</button>
        <button onclick="cambiar(3)" id="id3" class="py-4 rounded-2xl text-xs font-bold uppercase btn-dark">DIESEL</button>
    </div>

    <div id="lista" class="space-y-4 text-center">
        <div class="py-20 text-green-400 font-black animate-pulse">CARGANDO...</div>
    </div>

    <script>
        const datos = [
            {n: "COPEC", d: "Av. Vitacura 9800", p93: 1342, pD: 1080, dist: 0.8, lat: -33.385, lon: -70.536},
            {n: "SHELL", d: "Americo Vespucio 1200", p93: 1338, pD: 1075, dist: 1.2, lat: -33.401, lon: -70.567},
            {n: "PETROBRAS", d: "Las Condes 10500", p93: 1345, pD: 1082, dist: 2.5, lat: -33.412, lon: -70.521},
            {n: "COPEC", d: "Kennedy 7000", p93: 1340, pD: 1078, dist: 3.1, lat: -33.398, lon: -70.555}
        ];

        function mostrar(tipo) {
            const list = document.getElementById('lista');
            const b1 = document.getElementById('btn1');
            const b3 = document.getElementById('id3');
            
            b1.className = `py-4 rounded-2xl text-xs font-bold uppercase ${tipo === 1 ? 'btn-green' : 'btn-dark'}`;
            b3.className = `py-4 rounded-2xl text-xs font-bold uppercase ${tipo === 3 ? 'btn-green' : 'btn-dark'}`;

            let html = '';
            datos.forEach(e => {
                const precio = tipo === 1 ? e.p93 : e.pD;
                html += `
                <div class="card p-6 shadow-2xl border-l-4 border-green-500 text-left">
                    <div class="flex justify-between items-start mb-4">
                        <div class="max-w-[70%]">
                            <h2 class="text-xl font-black uppercase italic leading-tight text-white">${e.n}</h2>
                            <p class="text-[10px] text-gray-500 uppercase mt-1 italic">${e.d}</p>
                        </div>
                        <div class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold border border-blue-500/20">${e.dist} KM</div>
                    </div>
                    <div class="flex items-center justify-between mt-4">
                        <div class="text-3xl font-black text-green-500">$${precio}</div>
                        <button onclick="window.location.href='waze://?ll=${e.lat},${e.lon}&navigate=yes'" 
                            class="bg-[#33ccff] text-black font-black px-6 py-3 rounded-xl text-[10px] uppercase shadow-lg active:scale-95">WAZE</button>
                    </div>
                </div>`;
            });
            list.innerHTML = html;
        }

        function cambiar(t) {
            document.getElementById('lista').innerHTML = '<div class="py-20 text-green-400 font-black animate-pulse">ACTUALIZANDO...</div>';
            setTimeout(() => mostrar(t), 400);
        }

        setTimeout(() => mostrar(1), 800);
    </script>
</body>
</html>
