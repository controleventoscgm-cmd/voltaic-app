<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voltaic Spa | v1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #22c55e; --bg: #000; --card: rgba(30, 41, 59, 0.8); }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; min-height: 100vh; }
        .glass { background: var(--card); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .tab-active { background: #22c55e !important; color: #000 !important; font-weight: bold; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-4 pb-10">
    <header class="flex justify-between items-center mb-6 pt-4">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter uppercase text-white">VOLTAIC<span class="text-green-500 not-italic font-light">spa</span></h1>
            <p id="status" class="text-[9px] text-green-400 font-mono tracking-widest pulse uppercase">GPS ACTIVO ✅</p>
        </div>
        <div class="w-10 h-10 glass flex items-center justify-center text-lg">⚡</div>
    </header>

    <p class="text-[9px] uppercase tracking-widest text-gray-500 mb-2 ml-1">Distancia de búsqueda</p>
    <div class="glass p-1 flex gap-1 mb-4 text-[10px] font-bold">
        <button onclick="setR(15, this)" class="btn-r flex-1 py-3 rounded-xl tab-active">15 KM</button>
        <button onclick="setR(35, this)" class="btn-r flex-1 py-3 rounded-xl">35 KM</button>
        <button onclick="setR(50, this)" class="btn-r flex-1 py-3 rounded-xl">50 KM</button>
    </div>

    <p class="text-[9px] uppercase tracking-widest text-gray-500 mb-2 ml-1">Tipo de Combustible</p>
    <div class="glass p-1 flex gap-1 mb-6 text-[10px] font-bold">
        <button onclick="setT(1, this)" class="btn-t flex-1 py-3 rounded-xl tab-active">93 OCT</button>
        <button onclick="setT(2, this)" class="btn-t flex-1 py-3 rounded-xl">95 OCT</button>
        <button onclick="setT(3, this)" class="btn-t flex-1 py-3 rounded-xl">DIESEL</button>
    </div>

    <div id="lista" class="space-y-4 text-center py-10 text-gray-500">
        Iniciando sistemas de Voltaic...
    </div>

    <script>
        let R = 15; 
        let T = 1;  
        const E = 'cristiangodoymarchant@gmail.com'; 
        const K = 'Isigod5815';

        function setR(km, b){ R=km; upd(b, '.btn-r'); ini(); }
        function setT(t, b){ T=t; upd(b, '.btn-t'); ini(); }
        
        function upd(b, cls){ 
            document.querySelectorAll(cls).forEach(x=>x.classList.remove('tab-active')); 
            b.classList.add('tab-active'); 
        }

        async function ini() {
            const list = document.getElementById('lista');
            list.innerHTML = '<div class="py-10"><p class="pulse text-green-500 font-bold uppercase tracking-widest">Buscando Ahorro...</p></div>';
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const uLa = pos.coords.latitude;
                const uLo = pos.coords.longitude;
                
                try {
                    const res = await fetch(`https://api.cne.cl/v3/combustibles/vehicular/estaciones?token=${K}&email=${E}`);
                    const d = await res.json();
                    render(d.data, uLa, uLo);
                } catch (e) {
                    list.innerHTML = "Error al conectar con CNE.";
                }
            }, (err) => {
                list.innerHTML = "Por favor, activa el GPS del iPhone.";
            });
        }

        function dist(la1, lo1, la2, lo2) {
            const rad = x => x * Math.PI / 180;
            const dLa = rad(la2-la1); const dLo = rad(lo2-lo1);
            const a = Math.sin(dLa/2)**2 + Math.cos(rad(la1)) * Math.cos(rad(la2)) * Math.sin(dLo/2)**2;
            return 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function render(data, uLa, uLo) {
            let h = '';
            const f = data.map(e => ({...e, d: dist(uLa, uLo, e.ubicacion.latitud, e.ubicacion.longitud)}))
                         .filter(e => e.d <= R).sort((a,b) => a.d - b.d);

            if(f.length === 0) {
                document.getElementById('lista').innerHTML = `<p class="py-10 text-gray-400 font-bold uppercase">No hay bombas a ${R}KM.<br>Prueba subiendo el rango.</p>`;
                return;
            }

            f.forEach(e => {
                const p = T==1 ? e.precios['gasolina 93'] : T==2 ? e.precios['gasolina 95'] : e.precios['petroleo diesel'];
                if(!p) return;
                
                h += `<div class="glass p-5 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="font-black text-lg uppercase italic text-white leading-none">${e.nombre_fantasia}</h3>
                            <p class="text-[9px] text-gray-400 mt-1 uppercase">${e.direccion}</p>
                        </div>
                        <span class="text-[10px] bg-white/10 px-2 py-1 rounded-full font-bold text-green-400">${e.d.toFixed(1)} KM</span>
                    </div>
                    <div class="bg-black/40 rounded-2xl p-4 border border-white/5 mb-4">
                        <p class="text-[10px] font-bold text-green-500 leading-none">$${p}</p>
                    </div>
                    <button onclick="window.location.href='waze://?ll=${e.ubicacion.latitud},${e.ubicacion.longitud}&navigate=yes'" 
                        class="w-full bg-[#33ccff] text-black font-black py-4 rounded-xl text-xs uppercase tracking-widest active:scale-95 transition-transform">
                        Navegar con Waze
                    </button>
                </div>`;
            });
            document.getElementById('lista').innerHTML = h;
        }
        ini();
    </script>
</body>
</html>
