<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Voltaic Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0f1a; color: #fff; font-family: ui-sans-serif, system-ui, sans-serif; }
        .card { background: #1a2235; border-radius: 24px; border: 1px solid #2d3748; }
        .btn-green { background: #22c55e; color: #000; font-weight: 800; }
        .btn-dark { background: #111827; color: #94a3b8; }
    </style>
</head>
<body class="p-4 pb-20">
    <header class="flex justify-between items-center mb-6 pt-2 font-black italic">
        <h1 class="text-2xl text-white">VOLTAIC<span class="text-blue-500 not-italic font-light">spa</span></h1>
        <div class="px-3 py-1 bg-gray-900 border border-green-500/30 rounded-full text-[10px] text-green-500 font-bold uppercase">GPS Activo</div>
    </header>

    <div class="grid grid-cols-2 gap-3 mb-8 bg-black/40 p-1.5 rounded-3xl border border-gray-800">
        <button onclick="cargar(1)" class="py-4 rounded-2xl text-xs font-bold uppercase btn-green">93 OCT</button>
        <button onclick="cargar(3)" class="py-4 rounded-2xl text-xs font-bold uppercase btn-dark">DIESEL</button>
    </div>

    <div id="lista" class="space-y-4">
        <div class="py-20 text-center text-gray-500 font-bold uppercase text-xs italic">Iniciando sistema...</div>
    </div>

    <script>
        let tipoActual = 1;
        const creds = { e: 'cristiangodoymarchant@gmail.com', k: 'Isigod5815' };

        async function cargar(tipoSeleccionado = tipoActual) {
            tipoActual = tipoSeleccionado;
            const list = document.getElementById('lista');
            list.innerHTML = '<div class="py-20 text-center text-green-400 font-black animate-pulse uppercase">Conectando al Servidor...</div>';
            
            const btns = document.querySelectorAll('button');
            btns[0].className = `py-4 rounded-2xl text-xs font-bold uppercase ${tipoActual === 1 ? 'btn-green' : 'btn-dark'}`;
            btns[1].className = `py-4 rounded-2xl text-xs font-bold uppercase ${tipoActual === 3 ? 'btn-green' : 'btn-dark'}`;

            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const api = `https://api.cne.cl/v3/combustibles/vehicular/estaciones?token=${creds.k}&email=${creds.e}`;
                    
                    // NUEVO PUENTE DE ALTA VELOCIDAD (CorsProxy)
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(api)}`;
                    
                    const res = await fetch(proxyUrl);
                    if (!res.ok) throw new Error('Bloqueo');
                    const d = await res.json();
                    
                    if(!d.data) throw new Error('Sin datos');

                    const rad = Math.PI/180;
                    const estaciones = d.data.map(e => {
                        const dLa = (e.ubicacion.latitud - pos.coords.latitude) * rad;
                        const dLo = (e.ubicacion.longitud - pos.coords.longitude) * rad;
                        const a = Math.sin(dLa/2)**2 + Math.cos(pos.coords.latitude*rad) * Math.cos(e.ubicacion.latitud*rad) * Math.sin(dLo/2)**2;
                        const dist = 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                        return {...e, dist};
                    }).filter(e => e.dist <= 20);

                    estaciones.sort((a, b) => {
                        const pA = tipoActual === 1 ? (a.precios['gasolina 93'] || 99999) : (a.precios['petroleo diesel'] || 99999);
                        const pB = tipoActual === 1 ? (b.precios['gasolina 93'] || 99999) : (b.precios['petroleo diesel'] || 99999);
                        return pA - pB;
                    });

                    let html = '';
                    estaciones.slice(0, 10).forEach(e => {
                        const precioMostrar = tipoActual === 1 ? e.precios['gasolina 93'] : e.precios['petroleo diesel'];
                        if(!precioMostrar) return;
                        
                        html += `
                        <div class="card p-6 shadow-2xl border-l-4 border-green-500">
                            <div class="flex justify-between items-start mb-4">
                                <div class="max-w-[70%] text-left">
                                    <h2 class="text-xl font-black uppercase italic leading-tight text-white">${e.nombre_fantasia}</h2>
                                    <p class="text-[9px] text-gray-500 uppercase mt-1 leading-tight">${e.direccion}</p>
                                </div>
                                <div class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold border border-blue-500/20">${e.dist.toFixed(1)} KM</div>
                            </div>
                            <div class="flex items-center justify-between mt-4">
                                <div class="text-3xl font-black text-green-500">$${precioMostrar}</div>
                                <button onclick="window.location.href='waze://?ll=${e.ubicacion.latitud},${e.ubicacion.longitud}&navigate=yes'" 
                                    class="bg-[#33ccff] text-black font-black px-6 py-3 rounded-xl text-[10px] uppercase shadow-lg active:scale-95 transition-transform">WAZE</button>
                            </div>
                        </div>`;
                    });
                    list.innerHTML = html || '<p class="text-center py-10 text-gray-500 font-bold uppercase">Sin bombas cerca.</p>';
                } catch (err) {
                    list.innerHTML = '<div class="p-8 text-center text-red-500 font-bold uppercase text-xs italic">Intentando reconectar... Presiona un botón.</div>';
                }
            });
        }
        
        setTimeout(() => cargar(1), 500);
    </script>
</body>
</html>
